name: Deploy Vite Subfolder to Pages

on:
  push:
    branches: [ "main" ] # Change to your default branch name if different

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-size: 20
          # Cache dependencies inside the subfolder
          cache: 'npm'
          cache-dependency-path: 'dark-forest/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: dark-forest # Tells GitHub to run the command inside your subfolder

      - name: Build project
        run: npm run build
        working-directory: dark-forest # Compiles your project inside the subfolder

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Uploads the compiled dist folder from inside your subfolder
          path: 'dark-forest/dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
